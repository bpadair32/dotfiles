[general]
import = [
  "~/.config/alacritty/themes/themes/alabaster_dark.toml"
]

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/usr/bin/zsh"

[window]
padding.x = 10
padding.y = 10

decorations = "Buttonless"

opacity = 0.7
blur = true

[font]
size = 10
normal.family = "FiraCode Nerd Font"
