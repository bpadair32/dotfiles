##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*

# Scratchpad terminal
windowrule = float on, match:class ^kitty-scratchpad$
windowrule = size 75% 40%, match:class ^kitty-scratchpad$

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false
