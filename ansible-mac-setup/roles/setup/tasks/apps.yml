- name: application installs
  include: homebrew.yml

- name: install homebrew packages
  become: false
  homebrew:
    name: "{{ item }}"
    state: latest
  with_items: "{{ homebrew_packages }}"

- name: install homebrew cask applications
  become: false
  homebrew_cask:
    name: "{{ item }}"
    state: installed
  with_items: "{{ cask_applications }}"
